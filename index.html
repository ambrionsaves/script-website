<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simple Dark UI</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(-45deg, #111, #1a1a1a, #2a2a2a, #111);
    background-size: 400% 400%;
    animation: bgMove 10s ease infinite;
    font-family: Arial, sans-serif;
    color: white;
}

@keyframes bgMove {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

.container {
    text-align: center;
    animation: fadeIn 1.5s ease;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}

h1 {
    font-size: 2.8rem;
    margin-bottom: 10px;
}

p {
    color: #cfcfcf;
    font-size: 1.2rem;
    margin-bottom: 25px;
}

a {
    display: inline-block;
    padding: 10px 18px;
    border: 2px solid white;
    border-radius: 8px;
    text-decoration: none;
    color: white;
    transition: 0.3s;
}

a:hover {
    background: white;
    color: black;
    transform: scale(1.05);
}
</style>

</head>
